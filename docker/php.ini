; Production-oriented PHP settings
expose_php          = Off
display_errors      = Off
log_errors          = On
error_reporting     = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Reasonable upload / memory limits for a community-report app
memory_limit        = 64M
upload_max_filesize = 2M
post_max_size       = 2M
max_execution_time  = 30

; UTF-8 everywhere
default_charset     = "UTF-8"
mbstring.language   = UTF-8

; Timezone – override at runtime via TZ env var or change here
date.timezone       = Europe/Budapest
