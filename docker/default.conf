server {
    listen 80;
    server_name _;

    root /var/www/html/wwwroot;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Route all requests through F3's front controller
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Serve static assets from the ui/ directory at /ui/
    location /ui/ {
        alias /var/www/html/ui/;
        expires 7d;
        access_log off;
    }

    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;

        # Harden: only execute .php files that exist
        try_files $fastcgi_script_name =404;
    }

    # Deny access to hidden files and sensitive directories
    location ~ /\. {
        deny all;
    }

    location ~* ^/(vendor|db|lib|tmp)/ {
        deny all;
    }
}
